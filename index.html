<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cohorts - ILKKM ID Card Maker</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="cohort-shell" aria-label="ILKKM cohorts">
        <div class="cohort-page-header">
          <div class="heading">
            <h5 class="eyebrow">
              <img class="brand-icon" src="/icon.jpg" alt="" aria-hidden="true">
              <span>ILKKM ID CARD</span>
            </h5>
          </div>
          <div class="cohort-header-actions">
            <a class="primary-action add-cohort-button" href="/game" style="text-decoration: none;">
              <i data-lucide="gamepad-2" aria-hidden="true"></i>
              <span>Memory Game</span>
            </a>
            <button class="secondary-action add-cohort-button" id="addCohort" type="button" style="display: none;">
              <i data-lucide="plus" aria-hidden="true"></i>
              <span>Add Cohort</span>
            </button>
          </div>
        </div>

        <p class="export-count" id="cohortStatus" role="status">Loading cohorts...</p>
        <div class="cohort-grid" id="cohortGrid" aria-label="Available cohorts"></div>
      </section>

      <div class="modal-overlay" id="cohortModal" hidden>
        <form class="modal-dialog dataset-dialog" id="cohortForm" role="dialog" aria-modal="true" aria-labelledby="cohortModalTitle">
          <div class="modal-header">
            <h2 id="cohortModalTitle">ADD COHORT</h2>
            <button class="icon-button" id="closeCohortModal" type="button" aria-label="Close add cohort">
              <i data-lucide="x" aria-hidden="true"></i>
            </button>
          </div>
          <div class="dataset-summary">
            <label class="field">
              <span>Program</span>
              <input id="newCohortProgram" type="text" required>
            </label>
            <label class="field">
              <span>Sesi</span>
              <input id="newCohortSesi" type="text" required>
            </label>
            <div class="field upload-field">
              <span>Photo</span>
              <label class="upload-button" for="newCohortIcon" tabindex="0">
                <i data-lucide="image-up" aria-hidden="true"></i>
                <span id="cohortIconButtonText">Add Photo</span>
              </label>
              <input id="newCohortIcon" type="file" accept="image/jpeg,image/png">
              <button class="secondary-action danger-action remove-photo-action" id="removeCohortIcon" type="button" hidden>
                <i data-lucide="image-minus" aria-hidden="true"></i>
                <span>Remove Photo</span>
              </button>
            </div>
            <label class="field color-field">
              <span>Panel Color</span>
              <input id="newCohortColor" type="color" value="#0f8ea3">
            </label>
            <p class="save-status" id="cohortModalStatus" role="status">
              <i data-lucide="info" aria-hidden="true"></i>
              <span>Use the exports/admin login when prompted.</span>
            </p>
          </div>
          <div class="modal-actions">
            <button class="secondary-action" id="cancelCohort" type="button">Cancel</button>
            <button class="primary-action" id="saveCohort" type="submit">
              <i data-lucide="check" aria-hidden="true"></i>
              <span>Create Cohort</span>
            </button>
          </div>
        </form>
      </div>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="/home.js"></script>
  </body>
</html>
