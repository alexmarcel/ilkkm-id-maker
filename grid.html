<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grid Preview - ILKKM ID Card Maker</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="grid-shell" aria-label="Current cohort card grid">
        <div class="grid-page-header">
          <div class="grid-header-row">
            <div class="heading">
              <h5 class="eyebrow">
                <img class="brand-icon" src="icon.jpg" alt="" aria-hidden="true">
                <span>GRID PREVIEW</span>
              </h5>
              <a class="secondary-link inline-link" href="/">
                <i data-lucide="arrow-left" aria-hidden="true"></i>
                <span>BACK TO GENERATOR</span>
              </a>
            </div>
            <button class="primary-action grid-print-button" id="printGrid" type="button">
              <i data-lucide="printer" aria-hidden="true"></i>
              <span>Download All for Printing</span>
            </button>
          </div>
          <p class="export-count" id="gridStatus" role="status">Loading cards...</p>
        </div>

        <div class="card-grid" id="cardGrid" aria-label="Generated front cards"></div>
      </section>

      <div class="modal-overlay" id="printModal" hidden>
        <div class="modal-dialog dataset-dialog" role="dialog" aria-modal="true" aria-labelledby="printModalTitle">
          <div class="modal-header">
            <h2 id="printModalTitle">DOWNLOAD ALL FOR PRINTING</h2>
            <button class="icon-button" id="closePrintModal" type="button" aria-label="Close download confirmation">
              <i data-lucide="x" aria-hidden="true"></i>
            </button>
          </div>
          <div class="dataset-summary" id="printSummary"></div>
          <p class="dataset-warning" id="printWarning">The ZIP will contain each student in their own IC-number folder with front and back JPG files.</p>
          <div class="modal-actions">
            <button class="secondary-action" id="cancelPrintDownload" type="button">Cancel</button>
            <button class="primary-action" id="confirmPrintDownload" type="button">
              <i data-lucide="package-down" aria-hidden="true"></i>
              <span>Download ZIP</span>
            </button>
          </div>
        </div>
      </div>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="grid.js"></script>
  </body>
</html>
