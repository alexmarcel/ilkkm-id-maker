<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exports - ILKKM ID Card Maker</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="exports-shell" aria-label="Download generated cards">
        <form class="control-panel exports-panel" id="exportsForm">
          <div class="heading">
            <h5 class="eyebrow">
              <i data-lucide="archive" aria-hidden="true"></i>
              <span>DOWNLOAD ALL CARDS</span>
            </h5>
            <a class="secondary-link inline-link" id="exportsGeneratorLink" href="/">
              <i data-lucide="arrow-left" aria-hidden="true"></i>
              <p></p>
              <span>BACK TO GENERATOR</span>
            </a>
          </div>

          <label class="field">
            <span>Program</span>
            <input id="exportProgram" type="text" value="DIPLOMA KEJURURAWATAN" required>
          </label>

          <label class="field">
            <span>Sesi</span>
            <input id="exportSesi" type="text" value="SESI JANUARI 2026 - DISEMBER 2028" required>
          </label>

          <label class="settings-switch">
            <span>
              <strong>Accepting response</strong>
              <small>Turn on to stop the main form from accepting student entries.</small>
            </span>
            <input id="acceptingResponseToggle" type="checkbox" role="switch">
          </label>

          <p class="export-count" id="exportCount" role="status">Loading records...</p>

          <div class="export-actions">
            <button class="primary-action" id="downloadZip" type="button" disabled>
              <i data-lucide="package-down" aria-hidden="true"></i>
              <span>Download ZIP</span>
            </button>
            <button class="secondary-action" id="backupDataset" type="button" disabled>
              <i data-lucide="database-backup" aria-hidden="true"></i>
              <span>Backup Dataset</span>
            </button>
            <button class="secondary-action danger-action" id="restoreDataset" type="button">
              <i data-lucide="database-zap" aria-hidden="true"></i>
              <span>Restore Dataset</span>
            </button>
            <button class="secondary-action" id="regenerateCards" type="button" disabled>
              <i data-lucide="refresh-cw" aria-hidden="true"></i>
              <span>Regenerate Cards</span>
            </button>
            <input id="restoreDatasetInput" type="file" accept=".zip,application/zip,application/x-zip-compressed" hidden>
          </div>

          <div class="records-table-wrap">
            <table class="records-table" aria-label="Matching student records">
              <thead>
                <tr>
                  <th scope="col"></th>
                  <th scope="col">Name</th>
                  <th scope="col">Matrix Number</th>
                  <th scope="col">IC Number</th>
                  <th scope="col">Action</th>
                </tr>
              </thead>
              <tbody id="recordsTableBody">
                <tr>
                  <td colspan="5">Loading records...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </form>
      </section>

      <div class="modal-overlay" id="cardModal" hidden>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="cardModalTitle">
          <div class="modal-header">
            <h2 id="cardModalTitle">Card Preview</h2>
            <button class="icon-button" id="closeCardModal" type="button" aria-label="Close preview">
              <i data-lucide="x" aria-hidden="true"></i>
            </button>
          </div>
          <div class="modal-body">
            <img id="cardModalImage" alt="">
          </div>
        </div>
      </div>

      <div class="modal-overlay" id="datasetModal" hidden>
        <div class="modal-dialog dataset-dialog" role="dialog" aria-modal="true" aria-labelledby="datasetModalTitle">
          <div class="modal-header">
            <h2 id="datasetModalTitle">DATASET</h2>
            <button class="icon-button" id="closeDatasetModal" type="button" aria-label="Close dataset confirmation">
              <i data-lucide="x" aria-hidden="true"></i>
            </button>
          </div>
          <div class="dataset-summary" id="datasetSummary"></div>
          <p class="dataset-warning" id="datasetWarning" hidden></p>
          <div class="dataset-progress" id="datasetProgress" hidden>
            <div class="dataset-progress-header">
              <span id="datasetProgressLabel">Preparing...</span>
              <span id="datasetProgressCount">0 / 0</span>
            </div>
            <div class="dataset-progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
              <span id="datasetProgressBar"></span>
            </div>
          </div>
          <div class="modal-actions">
            <button class="secondary-action" id="cancelDatasetAction" type="button">Cancel</button>
            <button class="primary-action" id="confirmDatasetAction" type="button">
              <i data-lucide="check" aria-hidden="true"></i>
              <span>Confirm</span>
            </button>
          </div>
        </div>
      </div>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="/exports.js"></script>
  </body>
</html>
